name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install native audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopus-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features

      # Validates dist-workspace.toml + Cargo.toml so a PR that breaks the
      # release config gets caught here, not at next tag push.
      - name: install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: dist config check
        run: cargo dist plan

  release-cache-plan:
    name: plan release cache warm
    needs: [check]
    if: ${{ needs.check.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    continue-on-error: true
    runs-on: ubuntu-22.04
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - id: plan
        name: plan release-like build
        run: |
          dist plan --output-format=json > plan-dist-manifest.json
          echo "dist plan ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: upload dist manifest
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  release-cache-warm:
    name: warm release cache (${{ join(matrix.targets, ', ') }})
    needs: [release-cache-plan]
    if: ${{ always() && needs.release-cache-plan.result == 'success' && needs.release-cache-plan.outputs.val != '' && fromJson(needs.release-cache-plan.outputs.val).ci.github.artifacts_matrix.include != null }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-cache-plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: release-${{ join(matrix.targets, '-') }}
      PKG_CONFIG_ALLOW_CROSS: "1"
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi

      - name: Install dist
        run: ${{ matrix.install_dist.run }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ join(matrix.targets, '-') }}

      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          ${{ matrix.packages_install }}

          if [[ "${{ contains(join(matrix.targets, ' '), 'arm-unknown-linux-gnueabihf') }}" == "true" ]]; then
            sudo dpkg --add-architecture armhf

            sudo rm -f /etc/apt/sources.list.d/*.list || true
            sudo tee /etc/apt/sources.list >/dev/null <<< "deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse"

            sudo apt-get update
            sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            pkg-config \
            libasound2-dev:armhf \
            libopus-dev:armhf

            {
              echo "PKG_CONFIG_ALLOW_CROSS=1"
              echo "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig"
              echo "PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig"
              echo "PKG_CONFIG_SYSROOT_DIR=/"
              echo "CC_arm_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc"
              echo "CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc"
} >> "$GITHUB_ENV"
          fi
      - name: expose Homebrew Opus to pkg-config (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Build artifacts to warm cache
        run: |
          dist build --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "release-like build cache warmed successfully"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
